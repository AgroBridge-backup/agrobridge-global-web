# CI/CD Pipeline for AgroBridge Global Frontend
#
# Deploys static frontend (public_html/) to SiteGround shared hosting via SSH/rsync.
# Backend deploys separately to Render.com (auto-deploy from GitHub, no CI needed here).
#
# Required GitHub Secrets:
#   SITEGROUND_SSH_HOST       - SiteGround server hostname (e.g., sg123.siteground.biz)
#   SITEGROUND_SSH_USER       - SSH username for SiteGround
#   SITEGROUND_SSH_KEY        - Private SSH key (Ed25519 or RSA) for authentication
#   SITEGROUND_REMOTE_PATH    - Production document root (e.g., /home/username/public_html)
#   SITEGROUND_STAGING_PATH   - Staging document root (e.g., /home/username/staging.agrobridge.global)
#
# Optional GitHub Secrets:
#   SITEGROUND_SSH_PORT       - SSH port (defaults to 18765, SiteGround's non-standard port)
#   SLACK_WEBHOOK             - Slack webhook URL for deployment notifications
#   CODECOV_TOKEN             - Codecov upload token

name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  release-gates:
    name: Release Gates
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate configuration (fail-fast)
        run: npm run validate:config
        env:
          NODE_ENV: production
          JWT_ACCESS_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          CSRF_SECRET: cccccccccccccccccccccccccccccccc
          CORS_ORIGIN: https://allowed.agrobridge.test

      - name: Run security test suite
        run: npm run test:security

      - name: Run server boot smoke gate
        run: npm run test:smoke
        env:
          NODE_ENV: development
          JWT_ACCESS_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          CSRF_SECRET: cccccccccccccccccccccccccccccccc

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production --audit-level=high

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [release-gates, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: staging
      url: https://staging.agrobridge.global

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment secrets
        run: |
          if [ -z "$SITEGROUND_SSH_HOST" ]; then echo "::error::SITEGROUND_SSH_HOST not set" && exit 1; fi
          if [ -z "$SITEGROUND_SSH_USER" ]; then echo "::error::SITEGROUND_SSH_USER not set" && exit 1; fi
          if [ -z "$SITEGROUND_SSH_KEY" ]; then echo "::error::SITEGROUND_SSH_KEY not set" && exit 1; fi
          if [ -z "$SITEGROUND_STAGING_PATH" ]; then echo "::error::SITEGROUND_STAGING_PATH not set" && exit 1; fi
        env:
          SITEGROUND_SSH_HOST: ${{ secrets.SITEGROUND_SSH_HOST }}
          SITEGROUND_SSH_USER: ${{ secrets.SITEGROUND_SSH_USER }}
          SITEGROUND_SSH_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SITEGROUND_STAGING_PATH: ${{ secrets.SITEGROUND_STAGING_PATH }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SITEGROUND_SSH_KEY }}

      - name: Determine SSH port
        id: ssh-port
        run: |
          if [ -n "$SSH_PORT_SECRET" ]; then
            echo "port=$SSH_PORT_SECRET" >> "$GITHUB_OUTPUT"
          else
            echo "port=18765" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_PORT_SECRET: ${{ secrets.SITEGROUND_SSH_PORT }}

      - name: Add SiteGround host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ steps.ssh-port.outputs.port }} -H ${{ secrets.SITEGROUND_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to SiteGround (staging)
        run: |
          rsync -azv --delete \
            -e "ssh -p ${{ steps.ssh-port.outputs.port }}" \
            ./public_html/ \
            ${{ secrets.SITEGROUND_SSH_USER }}@${{ secrets.SITEGROUND_SSH_HOST }}:${{ secrets.SITEGROUND_STAGING_PATH }}/

      - name: Smoke test staging
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.agrobridge.global)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Staging smoke test failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Staging smoke test passed (HTTP $HTTP_STATUS)"

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
          text: "Staging deployment ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://agrobridge.global

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment secrets
        run: |
          if [ -z "$SITEGROUND_SSH_HOST" ]; then echo "::error::SITEGROUND_SSH_HOST not set" && exit 1; fi
          if [ -z "$SITEGROUND_SSH_USER" ]; then echo "::error::SITEGROUND_SSH_USER not set" && exit 1; fi
          if [ -z "$SITEGROUND_SSH_KEY" ]; then echo "::error::SITEGROUND_SSH_KEY not set" && exit 1; fi
          if [ -z "$SITEGROUND_REMOTE_PATH" ]; then echo "::error::SITEGROUND_REMOTE_PATH not set" && exit 1; fi
        env:
          SITEGROUND_SSH_HOST: ${{ secrets.SITEGROUND_SSH_HOST }}
          SITEGROUND_SSH_USER: ${{ secrets.SITEGROUND_SSH_USER }}
          SITEGROUND_SSH_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SITEGROUND_REMOTE_PATH: ${{ secrets.SITEGROUND_REMOTE_PATH }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SITEGROUND_SSH_KEY }}

      - name: Determine SSH port
        id: ssh-port
        run: |
          if [ -n "$SSH_PORT_SECRET" ]; then
            echo "port=$SSH_PORT_SECRET" >> "$GITHUB_OUTPUT"
          else
            echo "port=18765" >> "$GITHUB_OUTPUT"
          fi
        env:
          SSH_PORT_SECRET: ${{ secrets.SITEGROUND_SSH_PORT }}

      - name: Add SiteGround host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ steps.ssh-port.outputs.port }} -H ${{ secrets.SITEGROUND_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to SiteGround (production)
        run: |
          rsync -azv --delete \
            -e "ssh -p ${{ steps.ssh-port.outputs.port }}" \
            ./public_html/ \
            ${{ secrets.SITEGROUND_SSH_USER }}@${{ secrets.SITEGROUND_SSH_HOST }}:${{ secrets.SITEGROUND_REMOTE_PATH }}/

      - name: Smoke test production
        run: |
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://agrobridge.global)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Production smoke test failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Production smoke test passed (HTTP $HTTP_STATUS)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          FRONTEND_URL: https://agrobridge.global
          BACKEND_URL: https://api.agrobridge.global

      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
